name: MCP Mesh Receiver

on:
  repository_dispatch:
    types: [mcp_propagation]

permissions:
  contents: read

jobs:
  receive:
    runs-on: ubuntu-latest
    steps:
      - name: Validate propagation envelope
        env:
          EXPECTED_SOURCE_REPO: ${{ github.repository }}
          SOURCE_REPO: ${{ github.event.client_payload.source_repo }}
          SOURCE_WORKFLOW: ${{ github.event.client_payload.source_workflow }}
          SOURCE_TIMESTAMP: ${{ github.event.client_payload.timestamp }}
        run: |
          set -euo pipefail
          if [ "$SOURCE_REPO" != "$EXPECTED_SOURCE_REPO" ]; then
            echo "Unexpected source_repo=$SOURCE_REPO"
            exit 1
          fi
          if [ -z "$SOURCE_WORKFLOW" ] || [ -z "$SOURCE_TIMESTAMP" ]; then
            echo "Invalid propagation envelope"
            exit 1
          fi
          echo "RECEIVED_MCP_PROPAGATION"
          echo "source_repo=$SOURCE_REPO"
          echo "source_workflow=$SOURCE_WORKFLOW"
          echo "timestamp=$SOURCE_TIMESTAMP"
